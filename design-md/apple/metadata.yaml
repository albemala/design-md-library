design_md:
  title: "Apple"
  description: |-
    A photography-first interface that turns marketing into a museum gallery. Edge-to-edge product tiles alternate light and dark canvases, framed by SF Pro Display headlines with negative letter-spacing and a single Action Blue (#0066cc) interactive color. UI chrome recedes so the product can speak \u2014 no decorative gradients, no shadows on chrome, only the one signature drop-shadow under product imagery resting on a surface.
